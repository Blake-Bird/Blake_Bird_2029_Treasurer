<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blake Bird | SGA Treasurer 2029</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        /* =========================================
           CORE ARCHITECTURE & VARIABLES
           ========================================= */
        :root {
            --bg-dark: #030305;
            --hpu-purple: #3a0078;
            --quant-cyan: #00e5ff;
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #86868b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; line-height: 1.6; }
        
        /* Smooth Scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: rgba(0, 229, 255, 0.3); border-radius: 10px; }

        /* =========================================
           WEBGL 3D BACKGROUND
           ========================================= */
        #canvas-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none; opacity: 0.8; }
        main { position: relative; z-index: 10; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 5vw; }
        section { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 12vh 0; position: relative; }

        /* =========================================
           TYPOGRAPHY & 3D EFFECTS
           ========================================= */
        .text-3d {
            font-size: clamp(3.5rem, 8vw, 7rem); font-weight: 900; line-height: 1.05; letter-spacing: -0.04em; text-transform: uppercase;
            text-shadow: 0 1px 0 #ccc, 0 2px 0 #c9c9c9, 0 3px 0 #bbb, 0 4px 0 #b9b9b9, 0 5px 0 #aaa, 0 6px 1px rgba(0,0,0,.1), 0 0 5px rgba(0,0,0,.1), 0 1px 3px rgba(0,0,0,.3), 0 3px 5px rgba(0,0,0,.2), 0 5px 10px rgba(0,0,0,.25), 0 10px 10px rgba(0,0,0,.2), 0 20px 20px rgba(0, 229, 255, 0.15);
        }
        .gradient-text { background: linear-gradient(135deg, #fff, var(--quant-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .purple-gradient { background: linear-gradient(135deg, #fff, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p.lead { font-size: clamp(1.2rem, 2.5vw, 1.6rem); color: var(--text-muted); max-width: 800px; margin-bottom: 2rem; font-weight: 400; }

        /* Typewriter */
        .typewriter { font-size: 1.5rem; font-weight: 700; color: var(--quant-cyan); margin-bottom: 1rem; display: inline-block; letter-spacing: 2px; text-transform: uppercase; }
        .cursor { display: inline-block; width: 3px; height: 1.2em; background: var(--quant-cyan); animation: blink 1s infinite; vertical-align: middle; margin-left: 5px; }
        @keyframes blink { 50% { opacity: 0; } }

        /* =========================================
           ROTATING PROFILE CARD (HERO)
           ========================================= */
        .hero-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 50px; align-items: center; }
        @media (max-width: 968px) { .hero-grid { grid-template-columns: 1fr; } }
        
        .tilt-wrapper { perspective: 1000px; width: 100%; max-width: 450px; margin: 0 auto; }
        .tilt-card {
            width: 100%; aspect-ratio: 3/4; border-radius: 30px; border: 1px solid var(--glass-border);
            background: url('your-image.jpg') center/cover; /* REPLACE THIS IMAGE */
            box-shadow: 0 30px 60px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(255,255,255,0.2);
            transform-style: preserve-3d; transition: transform 0.1s; position: relative;
        }
        .tilt-card::after {
            content: "BLAKE BIRD"; position: absolute; bottom: -20px; right: -20px;
            font-size: 4rem; font-weight: 900; color: transparent; -webkit-text-stroke: 1px rgba(255,255,255,0.2);
            transform: translateZ(60px); pointer-events: none; white-space: nowrap;
        }

        /* =========================================
           BENTO BOX GRID (GLASSMORPHISM)
           ========================================= */
        .bento-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 24px; margin-top: 40px; }
        .bento-item { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 30px; padding: 40px; position: relative; overflow: hidden; transition: 0.4s ease; }
        .bento-item:hover { border-color: var(--quant-cyan); transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0, 229, 255, 0.1); }
        .col-8 { grid-column: span 8; } .col-4 { grid-column: span 4; } .col-12 { grid-column: span 12; }
        @media (max-width: 968px) { .col-8, .col-4 { grid-column: span 12; } }
        
        .stat { font-size: 4.5rem; font-weight: 900; color: var(--quant-cyan); line-height: 1; margin-bottom: 10px; }
        
        /* =========================================
           PULSING GUARANTEE FORM
           ========================================= */
        .pulse-border {
            position: relative; border-radius: 30px; background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.4); animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(0, 229, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0); } }

        input, textarea { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 16px; color: #fff; font-size: 1.2rem; margin-bottom: 20px; outline: none; transition: 0.3s; }
        input:focus, textarea:focus { border-color: var(--quant-cyan); background: rgba(255,255,255,0.05); }
        button { background: #fff; color: #000; padding: 20px 40px; font-size: 1.2rem; font-weight: 800; text-transform: uppercase; border: none; border-radius: 50px; cursor: pointer; width: 100%; transition: 0.3s; letter-spacing: 1px; }
        button:hover { background: var(--quant-cyan); box-shadow: 0 0 30px var(--quant-cyan); transform: scale(1.02); }

       <section id="philosophy">
    <div class="container">

            <h2 class="text-3d" style="font-size: clamp(2.5rem, 5vw, 5rem); margin-bottom: 20px;">

                <div onclick="window.open('resume.pdf')" 
                     style="position: relative; width: 260px; padding: 25px; border-radius: 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); cursor: pointer; transition: all 0.3s ease; backdrop-filter: blur(10px);">
                    <div style="position: absolute; inset: 0; border-radius: 16px; background: radial-gradient(circle at 50% 0%, rgba(0,255,255,0.15), transparent 70%); opacity: 0; transition: 0.3s;"></div>

                     style="position: relative; width: 260px; padding: 25px; border-radius: 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); cursor: pointer; transition: all 0.3s ease; backdrop-filter: blur(10px);">
                    <div style="position: absolute; inset: 0; border-radius: 16px; background: radial-gradient(circle at 50% 0%, rgba(128,0,255,0.2), transparent 70%); opacity: 0; transition: 0.3s;"></div>
                    <h3 style="margin-bottom: 10px;">Personal Essay</h3>
                    <p style="opacity: 0.7;">Motivation, vision, and long-term ambition</p>
                </div>

            </div>

            <blockquote style="text-align: left; max-width: 800px; margin: 40px auto 0;">
                "Treat effort as a privilege and failure as signal."
            </blockquote>
        </div>
    </div>
</section>
        <section id="proof">
            <div class="container">
                <h2 style="font-size: 3rem; margin-bottom: 2rem;" class="gs-reveal">The <span class="gradient-text">Engine</span> Behind the Vision.</h2>
                <div class="bento-grid">
                    
                    <div class="bento-item col-8 gs-reveal">

        <section id="guarantee">

    </main>

    <script>
        // 1. ADVANCED TYPEWRITER EFFECT
        const words = ["Mathematical Economist.", "Computer Scientist.", "Memory Maker.", "Treasurer, Class of '29."];
        let i = 0, j = 0, isDeleting = false;
        function typeWriter() {
            const el = document.getElementById("type-text");
            const current = words[i];
            el.textContent = isDeleting ? current.substring(0, j--) : current.substring(0, j++);
            if (!isDeleting && j === current.length + 1) { isDeleting = true; setTimeout(typeWriter, 2000); return; }
            if (isDeleting && j === 0) { isDeleting = false; i = (i + 1) % words.length; }
            setTimeout(typeWriter, isDeleting ? 40 : 100);
        }
        typeWriter();

        // 2. 3D TILT EFFECT FOR PROFILE CARD
        const profileCard = document.getElementById('profile');
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            profileCard.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // 3. GSAP SCROLL ANIMATIONS (APPLE TIER)
        gsap.registerPlugin(ScrollTrigger);
        gsap.utils.toArray('.gs-reveal').forEach(element => {
            gsap.fromTo(element, 
                { y: 60, opacity: 0, scale: 0.98 }, 
                {
                    y: 0, opacity: 1, scale: 1,
                    duration: 1, ease: "power3.out",
                    scrollTrigger: {
                        trigger: element,
                        start: "top 85%", 
                        toggleActions: "play none none reverse"
                    }
                }
            );
        });

        // 4. THREE.JS DYNAMIC PARTICLE WAVE ("THE PULSE")
        const initWebGL = () => {
            const container = document.getElementById('canvas-container');
            const scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x030305, 0.001); // Depth blending

            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 2000);
            camera.position.z = 600;
            camera.position.y = 200;

            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true, powerPreference: "high-performance" });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            // Create organic mathematical wave structure
            const geometry = new THREE.BufferGeometry();
            const particlesCount = 8000;
            const posArray = new Float32Array(particlesCount * 3);
            const scales = new Float32Array(particlesCount);

            let i = 0, j = 0;
            for (let ix = 0; ix < 100; ix++) {
                for (let iy = 0; iy < 80; iy++) {
                    posArray[i] = ix * 30 - 1500;    // x
                    posArray[i + 1] = 0;             // y (calculated in animation)
                    posArray[i + 2] = iy * 30 - 1000; // z
                    scales[j] = 1;
                    i += 3; j++;
                }
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            geometry.setAttribute('scale', new THREE.BufferAttribute(scales, 1));

            // Custom Shader Material for glowing dots
            const material = new THREE.PointsMaterial({
                color: 0x00e5ff,
                size: 4,
                transparent: true,
                opacity: 0.6,
                blending: THREE.AdditiveBlending
            });

            const particlesMesh = new THREE.Points(geometry, material);
            scene.add(particlesMesh);

            let count = 0;
            let targetY = 0;
            
            // Link camera height to user scroll for parallax
            window.addEventListener('scroll', () => { targetY = window.scrollY * 0.3; });

            const tick = () => {
                const positions = particlesMesh.geometry.attributes.position.array;
                const scales = particlesMesh.geometry.attributes.scale.array;
                let i = 0, j = 0;

                // Mathematical sine wave propagation (representing Quant models & campus energy)
                for (let ix = 0; ix < 100; ix++) {
                    for (let iy = 0; iy < 80; iy++) {
                        positions[i + 1] = (Math.sin((ix + count) * 0.3) * 50) + (Math.sin((iy + count) * 0.5) * 50);
                        scales[j] = (Math.sin((ix + count) * 0.3) + 1) * 2 + (Math.sin((iy + count) * 0.5) + 1) * 2;
                        i += 3; j++;
                    }
                }

                particlesMesh.geometry.attributes.position.needsUpdate = true;
                particlesMesh.geometry.attributes.scale.needsUpdate = true;
                
                // Smooth camera parallax
                camera.position.y += (-targetY + 200 - camera.position.y) * 0.05;
                camera.lookAt(scene.position);

                count += 0.05;
                renderer.render(scene, camera);
                window.requestAnimationFrame(tick);
            };
            tick();

            // Resize handler
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        };
        
        // Boot Engine
        window.onload = initWebGL;
    </script>
</body>
