<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Thank You | Blake Bird for Treasurer</title>
  <style>
    :root {
      --bg-dark: #030305;
      --quant-cyan: #00e5ff;
      --hpu-purple: #3a0078;
      --text-main: #ffffff;
      --text-muted: #86868b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top, rgba(0,229,255,0.09), transparent 35%),
        radial-gradient(circle at bottom right, rgba(58,0,120,0.18), transparent 40%),
        var(--bg-dark);
      color: var(--text-main);
      padding: 24px;
      overflow: hidden;
    }
    .shell {
      width: min(760px, 100%);
      padding: 42px 34px;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(20px);
      box-shadow: 0 30px 80px rgba(0,0,0,0.35);
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .shell::before {
      content: "";
      position: absolute;
      inset: -10%;
      background: radial-gradient(circle, rgba(0,229,255,0.12), transparent 55%);
      filter: blur(30px);
      z-index: 0;
    }
    .content { position: relative; z-index: 2; }
    h1 {
      font-size: clamp(2.6rem, 7vw, 4.8rem);
      line-height: 1;
      margin-bottom: 18px;
      text-transform: uppercase;
      letter-spacing: -0.04em;
      text-shadow: 0 10px 25px rgba(0,229,255,0.14);
    }
    p {
      color: var(--text-muted);
      font-size: clamp(1.05rem, 2vw, 1.25rem);
      line-height: 1.65;
      max-width: 640px;
      margin: 0 auto 14px;
    }
    .accent { color: var(--quant-cyan); font-weight: 800; }
    .action-row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }
    a, button {
      border: none;
      cursor: pointer;
      text-decoration: none;
      padding: 16px 22px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 0.95rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: 0.28s ease;
    }
    .primary {
      background: #fff;
      color: #000;
    }
    .primary:hover {
      background: var(--quant-cyan);
      box-shadow: 0 0 24px rgba(0,229,255,0.35);
      transform: translateY(-2px);
    }
    .secondary {
      background: rgba(255,255,255,0.04);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .secondary:hover {
      background: rgba(0,229,255,0.08);
      border-color: rgba(0,229,255,0.3);
      transform: translateY(-2px);
    }
    .tiny {
      margin-top: 18px;
      font-size: 0.95rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="content">
      <h1>Got It.</h1>
      <p>Your idea is in.</p>
      <p><span class="accent">I saw your submission</span> and I will respond within 24 hours.</p>
      <p>Your voice is now part of the pulse. If you know someone else who wants change, send them the site too.</p>

      <div class="action-row">
        <a class="primary" href="index.html#guarantee">Back to the Site</a>
        <button class="secondary" type="button" onclick="shareSite()">Share This Site</button>
        <button class="secondary" type="button" onclick="copyLink()">Copy Link</button>
      </div>

      <p class="tiny">Thank you for speaking up.</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script>
    function burst() {
      const count = 220;
      const defaults = { origin: { y: 0.65 } };

      function fire(particleRatio, opts) {
        confetti(Object.assign({}, defaults, opts, {
          particleCount: Math.floor(count * particleRatio)
        }));
      }

      fire(0.25, { spread: 26, startVelocity: 55 });
      fire(0.2, { spread: 60 });
      fire(0.35, { spread: 100, decay: 0.92, scalar: 0.9 });
      fire(0.1, { spread: 120, startVelocity: 25, decay: 0.95, scalar: 1.2 });
      fire(0.1, { spread: 120, startVelocity: 45 });
    }

    function copyLink() {
      const url = window.location.origin + window.location.pathname.replace('thankyou.html', 'index.html');
      navigator.clipboard.writeText(url).then(() => {
        alert('Site link copied.');
      }).catch(() => {
        alert('Copy failed. You can copy the URL manually.');
      });
    }

    async function shareSite() {
      const url = window.location.origin + window.location.pathname.replace('thankyou.html', 'index.html');
      const data = {
        title: 'Blake Bird | SGA Treasurer 2029',
        text: "Check out Blake Bird's SGA Treasurer campaign site.",
        url
      };
      if (navigator.share) {
        try {
          await navigator.share(data);
        } catch (e) {}
      } else {
        copyLink();
      }
    }

    window.addEventListener('load', () => {
      burst();
      if (performance && performance.navigation && performance.navigation.type === 2) {
        window.location.reload();
      }
    });
  </script>
</body>
</html>
